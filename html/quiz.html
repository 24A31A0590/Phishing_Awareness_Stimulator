<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phishing Quiz</title>
    <link rel="stylesheet" href="../css/quiz.css">
</head>
<body>

<header>
    <h1>Phishing Awareness Quiz</h1>
    <p>Test your knowledge and stay safe online!</p>
</header>

<div class="quiz-container">

    <div id="progress">
        Question <span id="current-q">1</span> / <span id="total-q"></span>
    </div>

    <div id="question-box">
        <h2 id="question"></h2>
        <div id="options"></div>
    </div>

    <!-- Explanation -->
    <div id="explanation-box" class="hidden">
        <p id="explanation"></p>
    </div>

    <div class="buttons">
        <button id="prev-btn">Previous</button>
        <button id="skip-btn">Skip</button>
        <button id="next-btn">Next</button>
    </div>

</div>

<div id="result-box" class="hidden">
    <h2>Your Score</h2>
    <p id="score"></p>
    <button onclick="restartQuiz()">Restart Quiz</button>
</div>

<script src="../js/quiz.js"></script>
</body>
</html>
